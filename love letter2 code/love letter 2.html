<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love letter for crush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="love letter 2.css" />
  </head>
  <body>
    <main class="page">
      <section class="envelope-stage">
        <div
          id="envelope"
          class="envelope close"
          role="button"
          aria-label="Open the love letter"
          tabindex="0"
        >
          <div class="front flap"></div>
          <div class="front pocket"></div>
          <div class="letter">
            <div class="letter-header">To: Crush</div>
            <p class="letter-text">Dear crush, you are so beautiful</p>
            <p class="letter-text">That every time I see you,</p>
            <p class="letter-text">my world stops.</p>
          </div>
          <div class="hearts">
            <div class="heart a1"></div>
            <div class="heart a2"></div>
            <div class="heart a3"></div>
          </div>
        </div>
      </section>

      <div class="controls">
        <button id="open">Open</button>
        <button id="reset">Close</button>
      </div>
    </main>

    <script src="love letter 2.js"></script>
  </body>
</html>
